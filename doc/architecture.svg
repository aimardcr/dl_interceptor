<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" letter-spacing="0.5">dl_interceptor</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Intercept ELF .init_array / .fini_array execution on Android (all ABIs)</text>

  <!-- dlopen box -->
  <rect x="60" y="100" width="180" height="50" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="150" y="130" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">dlopen("libfoo.so")</text>

  <!-- Arrow down -->
  <line x1="150" y1="150" x2="150" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker></defs>

  <!-- Linker maps ELF -->
  <rect x="60" y="180" width="180" height="44" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="197" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">LINKER</text>
  <text x="150" y="213" text-anchor="middle" fill="#94a3b8" font-size="11">Map ELF + Relocate GOT</text>

  <!-- Arrow down -->
  <line x1="150" y1="224" x2="150" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- call_constructors (hooked) -->
  <rect x="30" y="252" width="240" height="50" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="274" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">soinfo::call_constructors()</text>
  <text x="150" y="292" text-anchor="middle" fill="#f59e0b" font-size="10">HOOKED by dl_interceptor</text>

  <!-- Arrow to PRE callback -->
  <path d="M270,277 Q320,277 320,277" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker></defs>

  <!-- PRE callback box -->
  <rect x="330" y="252" width="230" height="50" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="274" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">PRE Callback</text>
  <text x="445" y="292" text-anchor="middle" fill="#86efac" font-size="11">Your code runs HERE</text>

  <!-- What you can do in PRE -->
  <rect x="620" y="230" width="250" height="92" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="745" y="252" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">In PRE callback you can:</text>
  <text x="635" y="272" fill="#94a3b8" font-size="11">- Hook functions before .init runs</text>
  <text x="635" y="290" fill="#94a3b8" font-size="11">- Inspect the loaded ELF</text>
  <text x="635" y="308" fill="#94a3b8" font-size="11">- Modify GOT/PLT entries</text>

  <!-- Arrow down from hooked -->
  <line x1="150" y1="302" x2="150" y2="341" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- .init + .init_array -->
  <rect x="60" y="345" width="180" height="50" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="366" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">.init + .init_array</text>
  <text x="150" y="384" text-anchor="middle" fill="#94a3b8" font-size="11">Library constructors run</text>

  <!-- Arrow down -->
  <line x1="150" y1="395" x2="150" y2="426" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Arrow to POST callback -->
  <path d="M240,453 Q280,453 325,453" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>

  <!-- POST callback box -->
  <rect x="330" y="428" width="230" height="50" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="450" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">POST Callback</text>
  <text x="445" y="468" text-anchor="middle" fill="#93c5fd" font-size="11">Library fully initialized</text>

  <!-- Return to caller -->
  <rect x="60" y="430" width="180" height="50" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="451" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Return to caller</text>
  <text x="150" y="469" text-anchor="middle" fill="#94a3b8" font-size="11">dlopen() returns handle</text>

  <!-- Architecture badges -->
  <rect x="60" y="520" width="85" height="30" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="102" y="540" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">ARM64</text>

  <rect x="155" y="520" width="85" height="30" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="197" y="540" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">ARM32</text>

  <rect x="250" y="520" width="85" height="30" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="292" y="540" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">x86</text>

  <rect x="345" y="520" width="85" height="30" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="387" y="540" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">x86_64</text>

  <text x="60" y="510" fill="#64748b" font-size="11" font-weight="600">SUPPORTED ARCHITECTURES</text>
</svg>
